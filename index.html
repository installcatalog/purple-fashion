<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Purple Fashion</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1877F2">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

html,
body{
width:100%;
min-height:100%;
background:#ffffff;
}

body{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
color:#071d33;
}

.splash{
width:100%;
min-height:100vh;
padding:28px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
background:#ffffff;
}

.splash-icon{
width:118px;
height:118px;
border-radius:31px;
background:linear-gradient(135deg,#2b92ff,#1877F2);
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:48px;
box-shadow:
0 20px 42px rgba(24,119,242,0.24),
inset 0 1px 0 rgba(255,255,255,0.35);
}

.brand{
font-size:42px;
line-height:48px;
font-weight:900;
letter-spacing:0;
margin-top:24px;
color:#071d33;
}

.subtitle{
font-size:17px;
line-height:25px;
font-weight:800;
color:#607086;
margin-top:8px;
}

.spinner{
width:48px;
height:48px;
border-radius:50%;
border:5px solid #d9ebff;
border-top-color:#1877F2;
margin-top:32px;
animation:spin 0.85s linear infinite;
}

.loading-text{
font-size:14px;
line-height:21px;
font-weight:900;
color:#1877F2;
margin-top:14px;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}
</style>

<script src="config.js"></script>
<script src="common.js" defer></script>
</head>

<body>
<main class="splash" aria-label="Opening Purple Fashion">
<div class="splash-icon">
<i class="fa-solid fa-bag-shopping"></i>
</div>
<h1 class="brand">Purple Fashion</h1>
<div class="subtitle">Opening your fashion store...</div>
<div class="spinner"></div>
<div class="loading-text">Opening Purple Fashion...</div>
</main>

<script>
if("serviceWorker" in navigator){
navigator.serviceWorker.register("sw.js").catch(function(){});
}

setTimeout(function(){
let target = localStorage.getItem("user") ? "home.html" : "login.html";
window.location.replace(target);
},900);
</script>
</body>
</html>
